<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linked List Visualizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
  /* ── Reset & base ───────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #080c17;
    --surface:   #0f1623;
    --surface2:  #151d2e;
    --border:    #1e2d45;
    --border2:   #253347;
    --text:      #e2e8f0;
    --text-muted:#64748b;
    --text-dim:  #334155;
    --accent:    #6366f1;
    --accent2:   #818cf8;
    --green:     #22c55e;
    --yellow:    #eab308;
    --red:       #ef4444;
    --purple:    #a855f7;
    --mono:      "JetBrains Mono", monospace;
    --sans:      "Syne", system-ui, sans-serif;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); overflow: hidden; }

  body {
    font-family: var(--sans);
    display: grid;
    grid-template-rows: 56px 1fr;
    grid-template-columns: 1fr 380px;
    grid-template-areas:
      "topbar topbar"
      "canvas sidebar";
  }

  /* ── Top bar ────────────────────────────────────────────────────── */
  #topbar {
    grid-area: topbar;
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 0 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    z-index: 10;
  }

  .logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    color: var(--accent2);
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .logo span { color: var(--text-muted); font-weight: 400; }

  .sep { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }

  /* Operation selector */
  #op-form {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
  }

  select, input[type=text], input[type=number] {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 5px 10px;
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  select:focus, input:focus { border-color: var(--accent); }
  select { cursor: pointer; }

  input[type=number] { width: 72px; }
  input[type=text]   { width: 140px; }

  label {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--mono);
    white-space: nowrap;
  }

  /* Buttons */
  .btn {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn:hover    { border-color: var(--accent); color: var(--accent2); background: #1a1f35; }
  .btn.primary  { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: var(--accent2); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ── Canvas (SVG area) ──────────────────────────────────────────── */
  #canvas {
    grid-area: canvas;
    position: relative;
    overflow: hidden;
    background: var(--bg);
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    background-position: -1px -1px;
  }

  #viz-svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Playback controls overlay */
  #playback {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px 12px;
    box-shadow: 0 8px 32px #00000060;
  }

  .pb-btn {
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    font-size: 14px;
    transition: all 0.12s;
    flex-shrink: 0;
  }
  .pb-btn:hover    { border-color: var(--accent); color: var(--accent2); }
  .pb-btn.active   { background: var(--accent); border-color: var(--accent); color: #fff; }
  .pb-btn:disabled { opacity: 0.25; cursor: not-allowed; }

  .pb-sep { width: 1px; height: 22px; background: var(--border); margin: 0 2px; }

  /* Progress bar */
  #progress-wrap {
    display: flex; align-items: center; gap: 8px;
    padding: 0 4px;
  }
  #progress-track {
    width: 160px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
  }
  #progress-fill {
    height: 100%; border-radius: 2px;
    background: var(--accent);
    transition: width 0.15s;
    pointer-events: none;
  }
  #step-counter {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    min-width: 52px;
    text-align: right;
  }

  /* Speed */
  #speed-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    white-space: nowrap;
  }
  #speed-range {
    -webkit-appearance: none;
    width: 64px; height: 4px;
    border-radius: 2px;
    background: var(--border2);
    outline: none;
    cursor: pointer;
  }
  #speed-range::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--accent2);
    cursor: pointer;
  }

  /* ── Sidebar ────────────────────────────────────────────────────── */
  #sidebar {
    grid-area: sidebar;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border-left: 1px solid var(--border);
    overflow: hidden;
  }

  .sidebar-section {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    font-family: var(--mono);
  }

  /* Pseudocode */
  #pseudocode {
    flex: 0 0 auto;
  }

  #code-lines {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .code-line {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 8px;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .code-line.active {
    background: #1e2d4580;
    border-left: 2px solid var(--accent);
    padding-left: 6px;
  }

  .line-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    width: 16px;
    text-align: right;
    flex-shrink: 0;
  }
  .line-code {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    white-space: pre;
    transition: color 0.2s;
  }
  .code-line.active .line-code { color: var(--text); }

  /* Explanation box */
  #explanation {
    flex: 0 0 auto;
  }

  #explanation-text {
    font-size: 13px;
    line-height: 1.65;
    color: var(--text);
    font-family: var(--sans);
    min-height: 60px;
  }

  /* Variable inspector */
  #variables {
    flex: 0 0 auto;
  }

  #var-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .var-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-family: var(--mono);
    font-size: 11px;
  }
  .var-name  { color: var(--purple); }
  .var-eq    { color: var(--text-dim); }
  .var-value { color: var(--yellow); }

  /* Legend */
  #legend {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  .legend-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
  }

  .legend-dot {
    width: 12px; height: 12px;
    border-radius: 2px;
    border: 1.5px solid;
    flex-shrink: 0;
  }

  /* Status badge */
  #status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    margin-left: auto;
  }
  #status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-dim);
    transition: background 0.2s;
  }
  #status-dot.playing { background: var(--green); animation: pulse 1s infinite; }
  #status-dot.paused  { background: var(--yellow); }
  #status-dot.done    { background: var(--accent2); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  /* Key step indicator */
  #keystep-banner {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 4px 14px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent2);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  #keystep-banner.show { opacity: 1; }

  /* Scrollbar */
  ::-webkit-scrollbar       { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<!-- ── Top bar ─────────────────────────────────────────────────────────────── -->
<header id="topbar">
  <div class="logo">list<span>.</span>viz</div>
  <div class="sep"></div>

  <form id="op-form" onsubmit="return false">
    <label>Initial list</label>
    <input type="text" id="input-list" value="10, 20, 30, 40" placeholder="e.g. 1, 2, 3">

    <div class="sep"></div>

    <label>Operation</label>
    <select id="op-select">
      <optgroup label="Traverse">
        <option value="traverse">traverse()</option>
      </optgroup>
      <optgroup label="Insert">
        <option value="insertAtHead">insertAtHead(value)</option>
        <option value="insertAtTail">insertAtTail(value)</option>
        <option value="insertAtIndex">insertAtIndex(value, index)</option>
      </optgroup>
      <optgroup label="Delete">
        <option value="deleteAtHead">deleteAtHead()</option>
        <option value="deleteAtTail">deleteAtTail()</option>
        <option value="deleteByValue">deleteByValue(value)</option>
        <option value="deleteAtIndex">deleteAtIndex(index)</option>
      </optgroup>
      <optgroup label="Search">
        <option value="searchByValue">searchByValue(value)</option>
      </optgroup>
      <optgroup label="Reverse">
        <option value="reverse">reverse()</option>
      </optgroup>
    </select>

    <input type="number" id="param-value" placeholder="value" value="5">
    <input type="number" id="param-index" placeholder="index" value="1" style="display:none">

    <button class="btn primary" onclick="runOperation()">▶ Run</button>
  </form>

  <div id="status-badge">
    <div id="status-dot"></div>
    <span id="status-text">idle</span>
  </div>
</header>

<!-- ── Canvas ─────────────────────────────────────────────────────────────── -->
<main id="canvas">
  <svg id="viz-svg"></svg>

  <div id="keystep-banner">⚑ Key step --, important concept</div>

  <!-- Playback controls -->
  <nav id="playback">
    <button class="pb-btn" id="btn-rewind"   title="Rewind"            onclick="ctrl.rewind()">⟨⟨</button>
    <button class="pb-btn" id="btn-prev-key" title="Prev key step"     onclick="ctrl.prevKeyStep()">⟨</button>
    <button class="pb-btn" id="btn-back"     title="Step back"         onclick="ctrl.stepBack()">‹</button>

    <div class="pb-sep"></div>

    <button class="pb-btn" id="btn-play"     title="Play / Pause"      onclick="ctrl.togglePlay()">▶</button>

    <div class="pb-sep"></div>

    <button class="pb-btn" id="btn-fwd"      title="Step forward"      onclick="ctrl.stepForward()">›</button>
    <button class="pb-btn" id="btn-next-key" title="Next key step"     onclick="ctrl.nextKeyStep()">⟩</button>
    <button class="pb-btn" id="btn-end"      title="Jump to end"       onclick="ctrl.jumpToEnd()">⟩⟩</button>

    <div class="pb-sep"></div>

    <div id="progress-wrap">
      <div id="progress-track" onclick="scrubTo(event)">
        <div id="progress-fill" style="width:0%"></div>
      </div>
      <span id="step-counter">0 / 0</span>
    </div>

    <div class="pb-sep"></div>

    <span id="speed-label">0.5×</span>
    <input type="range" id="speed-range" min="1" max="10" value="5"
           oninput="onSpeedChange(this.value)">
  </nav>
</main>

<!-- ── Sidebar ─────────────────────────────────────────────────────────────── -->
<aside id="sidebar">
  <div class="sidebar-section" id="pseudocode">
    <div class="section-title">Pseudocode</div>
    <div id="code-lines"></div>
  </div>

  <div class="sidebar-section" id="explanation">
    <div class="section-title">What's happening</div>
    <p id="explanation-text">Run an operation to begin.</p>
  </div>

  <div class="sidebar-section" id="variables">
    <div class="section-title">Live variables</div>
    <div id="var-list"></div>
  </div>

  <div class="sidebar-section" id="legend" style="flex:1">
    <div class="section-title">Color legend</div>
    <div class="legend-grid">
      <div class="legend-item"><div class="legend-dot" style="border-color:#eab308;background:#1c1a08"></div>visiting</div>
      <div class="legend-item"><div class="legend-dot" style="border-color:#22c55e;background:#052e16"></div>inserting</div>
      <div class="legend-item"><div class="legend-dot" style="border-color:#ef4444;background:#2d0a0a"></div>deleting</div>
      <div class="legend-item"><div class="legend-dot" style="border-color:#3b82f6;background:#0c1f3d"></div>found</div>
      <div class="legend-item"><div class="legend-dot" style="border-color:#a855f7;background:#160d2b"></div>prev pointer</div>
      <div class="legend-item"><div class="legend-dot" style="border-color:#8b5cf6;background:#1e1030"></div>comparing</div>
      <div class="legend-item"><div class="legend-dot" style="border-color:#6366f1;background:#111827"></div>head node</div>
      <div class="legend-item"><div class="legend-dot" style="border-color:#4ade80;background:#052e16"></div>new node</div>
    </div>
  </div>
</aside>

<script>
// ════════════════════════════════════════════════════════════════════
//  SCHEMA
// ════════════════════════════════════════════════════════════════════

const NODE_ROLES = Object.freeze({
  DEFAULT:'default', HEAD:'head', TAIL:'tail', VISITING:'visiting',
  COMPARING:'comparing', INSERTING:'inserting', DELETING:'deleting',
  FOUND:'found', NOT_FOUND:'not_found', PREV:'prev', NEW:'new',
});

const POINTER_ROLES = Object.freeze({
  DEFAULT:'default', TRAVERSING:'traversing', UPDATING:'updating',
  NEW:'new', BREAKING:'breaking',
});

const ACTIONS = Object.freeze({
  INITIAL_STATE:'INITIAL_STATE', OPERATION_COMPLETE:'OPERATION_COMPLETE',
  LIST_EMPTY:'LIST_EMPTY', SET_CURRENT_TO_HEAD:'SET_CURRENT_TO_HEAD',
  CHECK_WHILE_CONDITION:'CHECK_WHILE_CONDITION', VISIT_NODE:'VISIT_NODE',
  ADVANCE_CURRENT:'ADVANCE_CURRENT', ADVANCE_CURRENT_TO_NULL:'ADVANCE_CURRENT_TO_NULL',
  CREATE_NODE:'CREATE_NODE', SET_NEW_NEXT:'SET_NEW_NEXT', UPDATE_HEAD:'UPDATE_HEAD',
  TRAVERSE_TO_TAIL:'TRAVERSE_TO_TAIL', ATTACH_TO_TAIL:'ATTACH_TO_TAIL',
  TRAVERSE_TO_INDEX:'TRAVERSE_TO_INDEX', WIRE_NEW_NODE:'WIRE_NEW_NODE',
  INDEX_OUT_OF_BOUNDS:'INDEX_OUT_OF_BOUNDS', IDENTIFY_HEAD_DELETE:'IDENTIFY_HEAD_DELETE',
  ADVANCE_HEAD:'ADVANCE_HEAD', TRAVERSE_TO_PREV:'TRAVERSE_TO_PREV',
  IDENTIFY_TARGET:'IDENTIFY_TARGET', BYPASS_NODE:'BYPASS_NODE',
  REMOVE_NODE:'REMOVE_NODE', VALUE_NOT_FOUND:'VALUE_NOT_FOUND',
  COMPARE_VALUE:'COMPARE_VALUE', VALUE_FOUND:'VALUE_FOUND',
  INIT_POINTERS:'INIT_POINTERS', SAVE_NEXT:'SAVE_NEXT',
  REVERSE_POINTER:'REVERSE_POINTER', ADVANCE_POINTERS:'ADVANCE_POINTERS',
  UPDATE_HEAD_TO_PREV:'UPDATE_HEAD_TO_PREV',
});

function createNode(id, value, next = null) { return { id, value, next }; }
function createList() { return { nodes: {}, head: null, size: 0, _nextId: 1 }; }

function fromArray(values) {
  if (!values.length) return createList();
  const list = createList();
  const ids  = values.map((_, i) => `n${i + 1}`);
  values.forEach((v, i) => { list.nodes[ids[i]] = createNode(ids[i], v, ids[i+1] ?? null); });
  list.head = ids[0]; list.size = values.length; list._nextId = values.length + 1;
  return list;
}

function getOrderedIds(list) {
  const ids = []; let cur = list.head; const seen = new Set();
  while (cur !== null) { if (seen.has(cur)) break; seen.add(cur); ids.push(cur); cur = list.nodes[cur]?.next ?? null; }
  return ids;
}

function cloneState(s) { return JSON.parse(JSON.stringify(s)); }

function generateId(list) { const id = `n${list._nextId}`; list._nextId++; return id; }

function createStep({ stepIndex, state, action, explanation, nodeHighlights=[], pointerHighlights=[], variables={}, pseudocodeLine=null, isKeyStep=false }) {
  return { stepIndex, state: cloneState(state), action, explanation,
    highlights: { nodes: nodeHighlights, pointers: pointerHighlights },
    variables, pseudocodeLine, isKeyStep };
}

// ════════════════════════════════════════════════════════════════════
//  OPERATIONS
// ════════════════════════════════════════════════════════════════════

const PSEUDOCODES = {
  traverse: [
    'current ← head',
    'WHILE current ≠ NULL DO',
    '    visit(current.value)',
    '    current ← current.next',
    'END WHILE',
  ],
  insertAtHead: [
    'newNode ← createNode(value)',
    'newNode.next ← head',
    'head ← newNode',
    'size ← size + 1',
  ],
  insertAtTail: [
    'newNode ← createNode(value)',
    'IF head = NULL THEN head ← newNode; RETURN',
    'current ← head',
    'WHILE current.next ≠ NULL DO',
    '    current ← current.next',
    'END WHILE',
    'current.next ← newNode',
    'size ← size + 1',
  ],
  insertAtIndex: [
    'IF index = 0 THEN insertAtHead(value); RETURN',
    'IF index > size THEN ERROR',
    'newNode ← createNode(value)',
    'prev ← head; i ← 0',
    'WHILE i < index − 1 DO',
    '    prev ← prev.next; i ← i + 1',
    'END WHILE',
    'newNode.next ← prev.next',
    'prev.next ← newNode',
    'size ← size + 1',
  ],
  deleteAtHead: [
    'IF head = NULL THEN RETURN',
    'deleted ← head.value',
    'head ← head.next',
    'size ← size − 1',
    'RETURN deleted',
  ],
  deleteAtTail: [
    'IF head = NULL THEN RETURN',
    'IF head.next = NULL THEN head ← NULL; RETURN',
    'prev ← head',
    'WHILE prev.next.next ≠ NULL DO',
    '    prev ← prev.next',
    'END WHILE',
    'prev.next ← NULL',
    'size ← size − 1',
  ],
  deleteByValue: [
    'IF head = NULL THEN RETURN false',
    'IF head.value = target THEN head ← head.next; RETURN true',
    'prev ← head; current ← head.next',
    'WHILE current ≠ NULL DO',
    '    IF current.value = target THEN',
    '        prev.next ← current.next; RETURN true',
    '    prev ← current; current ← current.next',
    'END WHILE',
    'RETURN false',
  ],
  deleteAtIndex: [
    'IF index < 0 OR index ≥ size THEN ERROR',
    'IF index = 0 THEN deleteAtHead(); RETURN',
    'prev ← head; i ← 0',
    'WHILE i < index − 1 DO',
    '    prev ← prev.next; i ← i + 1',
    'END WHILE',
    'prev.next ← prev.next.next',
    'size ← size − 1',
  ],
  searchByValue: [
    'current ← head; index ← 0',
    'WHILE current ≠ NULL DO',
    '    IF current.value = target THEN RETURN index',
    '    current ← current.next; index ← index + 1',
    'END WHILE',
    'RETURN −1',
  ],
  reverse: [
    'prev    ← NULL',
    'current ← head',
    'WHILE current ≠ NULL DO',
    '    next         ← current.next',
    '    current.next ← prev',
    '    prev         ← current',
    '    current      ← next',
    'END WHILE',
    'head ← prev',
  ],
};

// ── traverse ──────────────────────────────────────────────────────
function traverse(list) {
  const steps = []; let idx = 0;
  const state = cloneState(list);
  steps.push(createStep({ stepIndex:idx++, state, action:ACTIONS.INITIAL_STATE,
    explanation:`Traversal visits every node from head to null. The list has ${list.size} node(s).`,
    nodeHighlights: list.head ? [{nodeId:list.head,role:NODE_ROLES.HEAD}] : [],
    variables:{current:null}, pseudocodeLine:null, isKeyStep:true }));

  if (!list.head) {
    steps.push(createStep({ stepIndex:idx++, state, action:ACTIONS.OPERATION_COMPLETE,
      explanation:'List is empty --, nothing to traverse.', variables:{current:null}, pseudocodeLine:4, isKeyStep:true }));
    return steps;

  if (!state.head) {
    steps.push(createStep({ stepIndex:idx++, state, action:ACTIONS.VALUE_NOT_FOUND,
      explanation:`Empty list. Value ${target} not found. Returning -1.`, pseudocodeLine:4, isKeyStep:true }));
    return steps;
  }
  steps.push(createStep({ stepIndex:idx++, state, action:ACTIONS.SET_CURRENT_TO_HEAD,
    explanation:`current ← head. Begin at index 0.`,
    nodeHighlights:[{nodeId:state.head,role:NODE_ROLES.VISITING}],
    variables:{current:state.head,index:0}, pseudocodeLine:0, isKeyStep:true }));
  let cur = list.head, pos = 0; const visited = new Set();
  while (cur !== null) {
    if (visited.has(cur)) break; visited.add(cur);
    const node = state.nodes[cur];
    const isMatch = node.value === target;
    steps.push(createStep({ stepIndex:idx++, state, action:ACTIONS.COMPARE_VALUE,
      explanation:`Index ${pos}: Is ${node.value} === ${target}? ${isMatch ? '✅ Found it!' : '❌ No match.'}`,
      nodeHighlights:[{nodeId:cur,role:isMatch?NODE_ROLES.FOUND:NODE_ROLES.COMPARING}],
      variables:{current:cur,index:pos}, pseudocodeLine:2, isKeyStep:isMatch }));
    if (isMatch) {
      steps.push(createStep({ stepIndex:idx++, state, action:ACTIONS.VALUE_FOUND,
        explanation:`Found! Value ${target} is at index ${pos}. Returning ${pos}. Search took ${pos+1} comparison(s).`,
        nodeHighlights:[{nodeId:cur,role:NODE_ROLES.FOUND}],
        variables:{current:cur,index:pos}, pseudocodeLine:2, isKeyStep:true }));
      return steps;
    }
    if (node.next) {
      steps.push(createStep({ stepIndex:idx++, state, action:ACTIONS.ADVANCE_CURRENT,
        explanation:`Not a match. Move to next node.`,
        nodeHighlights:[{nodeId:cur,role:NODE_ROLES.DEFAULT},{nodeId:node.next,role:NODE_ROLES.VISITING}],
        pointerHighlights:[{fromId:cur,toId:node.next,role:POINTER_ROLES.TRAVERSING}],
        variables:{current:node.next,index:pos+1}, pseudocodeLine:3 }));
    }
    cur = node.next; pos++;
  }
  steps.push(createStep({ stepIndex:idx++, state, action:ACTIONS.VALUE_NOT_FOUND,
    explanation:`Reached end of list. Value ${target} not found after ${pos} comparison(s). Returning -1.`,
    pseudocodeLine:4, isKeyStep:true }));
  return steps;
}

// ── reverse ───────────────────────────────────────────────────────
function reverse(list) {
  const steps = []; let idx = 0;
  const state = cloneState(list);
  steps.push(createStep({ stepIndex:idx++, state, action:ACTIONS.INITIAL_STATE,
    explanation:`Reverse the list in-place using three pointers: prev, current, next. O(n) time, O(1) space.`,
    nodeHighlights:state.head?[{nodeId:state.head,role:NODE_ROLES.HEAD}]:[],
    isKeyStep:true }));
  if (!state.head || !state.nodes[state.head].next) {
    steps.push(createStep({ stepIndex:idx++, state, action:ACTIONS.OPERATION_COMPLETE,
      explanation:!state.head ? `Empty list --, nothing to reverse.` : `Single node --, already reversed.`,
      isKeyStep:true })); return steps;
  }
  steps.push(createStep({ stepIndex:idx++, state, action:ACTIONS.INIT_POINTERS,
    explanation:`Initialise: prev = null, current = head. "prev" trails behind "current". At each step we flip current.next to point backward.`,
    nodeHighlights:[{nodeId:state.head,role:NODE_ROLES.VISITING}],
    variables:{prev:null,current:state.head}, pseudocodeLine:0, isKeyStep:true }));
  let prevId = null, curId = list.head; const visited = new Set();
  while (curId !== null) {
    if (visited.has(curId)) break; visited.add(curId);
    const node = state.nodes[curId], nextId = node.next;
    steps.push(createStep({ stepIndex:idx++, state, action:ACTIONS.SAVE_NEXT,
      explanation:`next ← current.next (${nextId ? `value: ${state.nodes[nextId].value}` : 'null'}). ⚠️ We MUST save this before overwriting current.next, or we permanently lose the rest of the list.`,
      nodeHighlights:[{nodeId:curId,role:NODE_ROLES.VISITING},...(prevId?[{nodeId:prevId,role:NODE_ROLES.PREV}]:[]),...(nextId?[{nodeId:nextId,role:NODE_ROLES.COMPARING}]:[])],
      pointerHighlights:nextId?[{fromId:curId,toId:nextId,role:POINTER_ROLES.TRAVERSING}]:[],
      variables:{prev:prevId,current:curId,next:nextId}, pseudocodeLine:3, isKeyStep:true }));
    state.nodes[curId].next = prevId;
    steps.push(createStep({ stepIndex:idx++, state, action:ACTIONS.REVERSE_POINTER,
      explanation:`current.next ← prev. The pointer is now REVERSED --, this node no longer points forward, it points backward to prev (${prevId ? `value: ${state.nodes[prevId].value}` : 'null'}).`,
      nodeHighlights:[{nodeId:curId,role:NODE_ROLES.INSERTING},...(prevId?[{nodeId:prevId,role:NODE_ROLES.PREV}]:[])],
      pointerHighlights:prevId?[{fromId:curId,toId:prevId,role:POINTER_ROLES.NEW}]:[],
      variables:{prev:prevId,current:curId,next:nextId}, pseudocodeLine:4, isKeyStep:true }));
    steps.push(createStep({ stepIndex:idx++, state, action:ACTIONS.ADVANCE_POINTERS,
      explanation:`prev ← current; current ← next. Slide both pointers forward. We still have next because we saved it earlier.`,
      nodeHighlights:[{nodeId:curId,role:NODE_ROLES.DEFAULT},...(nextId?[{nodeId:nextId,role:NODE_ROLES.VISITING}]:[])],
      variables:{prev:curId,current:nextId,next:null}, pseudocodeLine:5 }));
    prevId = curId; curId = nextId;
  }
  const oldHead = state.head; state.head = prevId;
  steps.push(createStep({ stepIndex:idx++, state, action:ACTIONS.UPDATE_HEAD,
    explanation:`head ← prev. "prev" is now the original tail --, it becomes the new head.`,
    nodeHighlights:[{nodeId:prevId,role:NODE_ROLES.HEAD}],
    variables:{prev:prevId,current:null}, pseudocodeLine:8, isKeyStep:true }));
  steps.push(createStep({ stepIndex:idx++, state, action:ACTIONS.OPERATION_COMPLETE,
    explanation:`Reversal complete! Every "next" pointer has been flipped. Original head (value: ${list.nodes[oldHead].value}) is now the tail. O(n) time, O(1) space.`,
    nodeHighlights:[{nodeId:prevId,role:NODE_ROLES.HEAD}], isKeyStep:true }));
  return steps;
}

// ════════════════════════════════════════════════════════════════════
//  PLAYBACK CONTROLLER
// ════════════════════════════════════════════════════════════════════
const STATUS = { IDLE:'idle', PLAYING:'playing', PAUSED:'paused', DONE:'done' };
const BASE_MS = 900, MIN_MS = 80;

class PlaybackController {
  constructor(steps, opts = {}) {
    if (!steps.length) throw new Error('Empty steps');
    this._steps = steps; this._index = 0;
    this._status = STATUS.IDLE; this._timer = null;
    this._speed = opts.speed ?? 1;
    this._pauseOnKeySteps = opts.pauseOnKeySteps ?? true;
    this._listeners = { frame:new Set(), narrative:new Set(), statusChange:new Set(), complete:new Set() };
  }
  get currentIndex()  { return this._index; }
  get totalSteps()    { return this._steps.length; }
  get currentStep()   { return this._steps[this._index]; }
  get status()        { return this._status; }
  get speed()         { return this._speed; }
  get isPlaying()     { return this._status === STATUS.PLAYING; }
  get isAtStart()     { return this._index === 0; }
  get isAtEnd()       { return this._index === this._steps.length - 1; }
  get progress()      { return this._steps.length <= 1 ? 1 : this._index / (this._steps.length - 1); }
  on(ev, fn) { this._listeners[ev].add(fn); return () => this._listeners[ev].delete(fn); }
  play() {
    if (this.isPlaying) return;
    if (this.isAtEnd) this._setIndex(0);
    this._setStatus(STATUS.PLAYING); this._scheduleNext();
  }
  pause() { if (!this.isPlaying) return; this._clearTimer(); this._setStatus(STATUS.PAUSED); }
  togglePlay() { this.isPlaying ? this.pause() : this.play(); }
  stepForward() { if (this.isAtEnd) return; this._clearTimer(); if (this.isPlaying) this._setStatus(STATUS.PAUSED); this._setIndex(this._index + 1); }
  stepBack() { if (this.isAtStart) return; this._clearTimer(); if (this.isPlaying) this._setStatus(STATUS.PAUSED); this._setIndex(this._index - 1); }
  jumpTo(i) { const c = Math.max(0, Math.min(this._steps.length - 1, i)); this._clearTimer(); if (this.isPlaying) this._setStatus(STATUS.PAUSED); this._setIndex(c); }
  rewind() { this.jumpTo(0); this._setStatus(STATUS.IDLE); }
  jumpToEnd() { this.jumpTo(this._steps.length - 1); }
  nextKeyStep() { const i = this._steps.findIndex((s,i) => i > this._index && s.isKeyStep); this.jumpTo(i !== -1 ? i : this._steps.length - 1); }
  prevKeyStep() { let i = this._index - 1; while (i >= 0) { if (this._steps[i].isKeyStep) { this.jumpTo(i); return; } i--; } this.rewind(); }
  setSpeed(s) { this._speed = Math.max(0.1, s); if (this.isPlaying) { this._clearTimer(); this._scheduleNext(); } }
  loadSteps(steps) { this._clearTimer(); this._steps = steps; this._index = 0; this._status = STATUS.IDLE; this._emit('statusChange', this._statusPayload()); this._dispatchCurrentStep(); }
  destroy() { this._clearTimer(); Object.values(this._listeners).forEach(s => s.clear()); }
  _intervalMs() { return Math.max(MIN_MS, BASE_MS / this._speed); }
  _scheduleNext() { this._timer = setTimeout(() => this._advance(), this._intervalMs()); }
  _clearTimer() { if (this._timer) { clearTimeout(this._timer); this._timer = null; } }
  _advance() {
    if (this.isAtEnd) { this._setStatus(STATUS.DONE); this._emit('complete'); return; }
    this._setIndex(this._index + 1);
    const step = this._steps[this._index];
    if (this._pauseOnKeySteps && step.isKeyStep) { this._setStatus(STATUS.PAUSED); return; }
    if (this.isAtEnd) { this._setStatus(STATUS.DONE); this._emit('complete'); return; }
    this._scheduleNext();
  }
  _setIndex(i) { this._index = i; this._dispatchCurrentStep(); this._emit('statusChange', this._statusPayload()); }
  _setStatus(s) { this._status = s; this._emit('statusChange', this._statusPayload()); }
  _dispatchCurrentStep() { const s = this._steps[this._index]; this._emit('frame', s); this._emit('narrative', s); }
  _statusPayload() { return { status:this._status, currentIndex:this._index, totalSteps:this._steps.length, progress:this.progress }; }
  _emit(ev, p) { this._listeners[ev]?.forEach(fn => { try { fn(p); } catch(e) { console.error(e); } }); }
}

// ════════════════════════════════════════════════════════════════════
//  THEME & LAYOUT
// ════════════════════════════════════════════════════════════════════
const T = {
  nodeValueW:96, nodeNextW:40, nodeH:52, nodeRx:6, nodeGap:80, rowY:200,
  valueFontSize:18, labelFontSize:10,
  fontFamily:'"JetBrains Mono","Fira Code",monospace',
  arrowSize:8, arrowStrokeW:2, nullStubLen:36, labelOffsetY:44,
  nodeRoles: {
    default:   {fill:'#111827',stroke:'#334155',textFill:'#e2e8f0',nextBoxFill:'#1e293b'},
    head:      {fill:'#111827',stroke:'#6366f1',textFill:'#e2e8f0',nextBoxFill:'#1e293b'},
    tail:      {fill:'#111827',stroke:'#334155',textFill:'#e2e8f0',nextBoxFill:'#1e293b'},
    visiting:  {fill:'#1c1a08',stroke:'#eab308',textFill:'#fef9c3',nextBoxFill:'#2a2508'},
    comparing: {fill:'#1a1025',stroke:'#a855f7',textFill:'#f3e8ff',nextBoxFill:'#230f35'},
    inserting: {fill:'#052e16',stroke:'#22c55e',textFill:'#dcfce7',nextBoxFill:'#071f10'},
    deleting:  {fill:'#2d0a0a',stroke:'#ef4444',textFill:'#fee2e2',nextBoxFill:'#3d0f0f'},
    found:     {fill:'#0c1f3d',stroke:'#3b82f6',textFill:'#dbeafe',nextBoxFill:'#0d1f3f'},
    not_found: {fill:'#1c1410',stroke:'#f97316',textFill:'#fed7aa',nextBoxFill:'#251a10'},
    prev:      {fill:'#160d2b',stroke:'#8b5cf6',textFill:'#ede9fe',nextBoxFill:'#1e1030'},
    new:       {fill:'#052e16',stroke:'#4ade80',textFill:'#dcfce7',nextBoxFill:'#071f10'},
  },
  pointerRoles: {
    default:    {stroke:'#475569',dasharray:null},
    traversing: {stroke:'#eab308',dasharray:null},
    updating:   {stroke:'#22c55e',dasharray:null},
    new:        {stroke:'#4ade80',dasharray:null},
    breaking:   {stroke:'#ef4444',dasharray:'6 3'},
  },
  t: { nodeEnter:350,nodeExit:250,nodeMove:450,colorChange:280,
       arrowEnter:300,arrowExit:200,arrowReroute:380,headLabel:280 },
};

function computeLayout(state) {
  const ids = getOrderedIds(state);
  const nodeW = T.nodeValueW + T.nodeNextW;
  const step  = nodeW + T.nodeGap;
  const pos   = {};
  ids.forEach((id, i) => { pos[id] = { x: 80 + i * step + nodeW / 2, y: T.rowY }; });
  return pos;
}

// ════════════════════════════════════════════════════════════════════
//  ANIMATION LAYER
// ════════════════════════════════════════════════════════════════════
class AnimationLayer {
  constructor(svgEl) {
    this._svgEl = svgEl;
    this._svg   = d3.select(svgEl);
    this._prev  = null;
    this._setupDefs();
    this._innerG     = this._svg.append('g').attr('class', 'zoom-container');
    this._layerArrows = this._innerG.append('g').attr('class', 'layer-arrows');
    this._layerNodes  = this._innerG.append('g').attr('class', 'layer-nodes');
    this._layerLabels = this._innerG.append('g').attr('class', 'layer-labels');
    this._setupZoom();
  }

  _setupDefs() {
    this._svg.select('defs').remove();
    const defs = this._svg.append('defs');
    Object.entries(T.pointerRoles).forEach(([role, style]) => {
      defs.append('marker')
        .attr('id', `arrow-${role}`)
        .attr('viewBox','0 -5 10 10').attr('refX',9).attr('refY',0)
        .attr('markerWidth',T.arrowSize).attr('markerHeight',T.arrowSize)
        .attr('orient','auto')
        .append('path').attr('d','M0,-5L10,0L0,5').attr('fill', style.stroke);
    });
    // Head arrow marker (indigo)
    defs.append('marker')
      .attr('id','arrow-head-label').attr('viewBox','0 -5 10 10')
      .attr('refX',9).attr('refY',0).attr('markerWidth',6).attr('markerHeight',6)
      .attr('orient','auto')
      .append('path').attr('d','M0,-5L10,0L0,5').attr('fill','#6366f1');
  }

  _setupZoom() {
    this._zoom = d3.zoom().scaleExtent([0.25, 3])
      .on('zoom', e => { this._innerG.attr('transform', e.transform); });
    this._svg.call(this._zoom);
    this._currentT = d3.zoomIdentity;
  }

  render(step) {
    const pos    = computeLayout(step.state);
    const cp     = this._choreograph(step);
    const roleMap = {};
    (step.highlights?.nodes ?? []).forEach(h => { roleMap[h.nodeId] = h.role; });

    this._renderNodes(step.state, pos, roleMap, cp);
    this._renderArrows(step.state, pos, step, cp);
    this._renderLabels(step.state, step.variables, pos, cp);
    this._panToActive(pos, roleMap);
    this._prev = step;
  }

  _choreograph(step) {
    const t = T.t, a = step.action;
    const D = {
      nodeEnter:{delay:0,duration:t.nodeEnter}, nodeExit:{delay:0,duration:t.nodeExit},
      nodeMove:{delay:0,duration:t.nodeMove}, colorChange:{delay:0,duration:t.colorChange},
      arrowEnter:{delay:0,duration:t.arrowEnter}, arrowExit:{delay:0,duration:t.arrowExit},
      arrowReroute:{delay:0,duration:t.arrowReroute}, headLabel:{delay:0,duration:t.headLabel},
    };
    if (a===ACTIONS.CREATE_NODE)
      return {...D, nodeEnter:{delay:0,duration:t.nodeEnter}, arrowEnter:{delay:200,duration:t.arrowEnter}};
    if (a===ACTIONS.SET_NEW_NEXT||a===ACTIONS.ATTACH_TO_TAIL||a===ACTIONS.WIRE_NEW_NODE)
      return {...D, arrowEnter:{delay:150,duration:t.arrowEnter}, arrowReroute:{delay:150,duration:t.arrowReroute}};
    if (a===ACTIONS.UPDATE_HEAD||a===ACTIONS.ADVANCE_HEAD||a===ACTIONS.UPDATE_HEAD_TO_PREV)
      return {...D, headLabel:{delay:0,duration:t.headLabel}, colorChange:{delay:100,duration:t.colorChange}, arrowExit:{delay:0,duration:t.arrowExit}, arrowEnter:{delay:100,duration:t.arrowEnter}};
    if (a===ACTIONS.BYPASS_NODE||a===ACTIONS.REMOVE_NODE)
      return {...D, arrowReroute:{delay:0,duration:t.arrowReroute}, nodeExit:{delay:100,duration:t.nodeExit}};
    if (a===ACTIONS.REVERSE_POINTER)
      return {...D, arrowExit:{delay:0,duration:t.arrowExit}, arrowEnter:{delay:t.arrowExit,duration:t.arrowEnter}, colorChange:{delay:0,duration:t.colorChange}};
    return D;
  }

  _nodeStyle(id, roleMap) {
    const role = roleMap[id] ?? 'default';
    return T.nodeRoles[role] ?? T.nodeRoles.default;
  }

  _renderNodes(state, pos, roleMap, cp) {
    const nodeW = T.nodeValueW + T.nodeNextW;
    const ids   = getOrderedIds(state);
    const data  = ids.map(id => ({ id, node:state.nodes[id], pos:pos[id], style:this._nodeStyle(id, roleMap) }));

    const groups = this._layerNodes.selectAll('g.node').data(data, d => d.id);

    // EXIT
    groups.exit()
      .transition().delay(cp.nodeExit.delay).duration(cp.nodeExit.duration)
        .style('opacity', 0).attr('transform', d => {
          const p = d.pos || pos[d.id] || {x:0,y:T.rowY};
          return `translate(${p.x},${p.y}) scale(0.5)`;
        }).remove();

    // ENTER
    const entered = groups.enter().append('g').attr('class','node')
      .attr('transform', d => `translate(${d.pos.x},${d.pos.y})`).style('opacity',0.01);

    entered.append('rect').attr('class','value-box')
      .attr('x',-nodeW/2).attr('y',-T.nodeH/2).attr('width',T.nodeValueW).attr('height',T.nodeH).attr('rx',T.nodeRx)
      .attr('fill', d => d.style.fill).attr('stroke', d => d.style.stroke).attr('stroke-width',1.5);
    entered.append('rect').attr('class','next-box')
      .attr('x',-nodeW/2+T.nodeValueW).attr('y',-T.nodeH/2).attr('width',T.nodeNextW).attr('height',T.nodeH).attr('rx',T.nodeRx)
      .attr('fill', d => d.style.nextBoxFill).attr('stroke', d => d.style.stroke).attr('stroke-width',1.5);
    entered.append('line').attr('class','divider')
      .attr('x1',-nodeW/2+T.nodeValueW).attr('y1',-T.nodeH/2+5)
      .attr('x2',-nodeW/2+T.nodeValueW).attr('y2', T.nodeH/2-5)
      .attr('stroke', d => d.style.stroke)
      .attr('stroke-opacity',0.4).attr('stroke-width',1);
    entered.append('text').attr('class','value-text')
      .attr('x',-nodeW/2+T.nodeValueW/2).attr('y',0)
      .attr('text-anchor','middle').attr('dominant-baseline','central')
      .attr('font-family',T.fontFamily).attr('font-size',T.valueFontSize).attr('font-weight','600')
      .attr('fill', d => d.style.textFill)
      .text(d => d.node?.value ?? '');
    entered.append('text').attr('class','next-sym')
      .attr('x',-nodeW/2+T.nodeValueW+T.nodeNextW/2).attr('y',0)
      .attr('text-anchor','middle').attr('dominant-baseline','central')
      .attr('font-family',T.fontFamily).attr('font-size',13)
      .attr('fill', d => d.style.stroke)
      .text('→');

    const merged = entered.merge(groups);

    merged.transition().delay(cp.nodeMove.delay).duration(cp.nodeMove.duration)
      .attr('transform', d => `translate(${d.pos.x},${d.pos.y})`)
      .style('opacity', 1);

    merged.each(function(d) {
      const g = d3.select(this);
      g.select('.value-box').attr('fill',d.style.fill).attr('stroke',d.style.stroke).attr('stroke-width',1.5);
      g.select('.next-box').attr('fill',d.style.nextBoxFill).attr('stroke',d.style.stroke).attr('stroke-width',1.5);
      g.select('.divider').attr('stroke',d.style.stroke);
      g.select('.value-text').attr('fill',d.style.textFill).text(d.node?.value ?? '');
      g.select('.next-sym').attr('fill',d.style.stroke).text('→');
    });
  }

  _arrowPath(d) {
    const nodeW = T.nodeValueW + T.nodeNextW;
    const sx = d.from.x + nodeW/2, sy = d.from.y;
    if (d.type === 'null') return `M${sx},${sy} L${sx+T.nullStubLen},${sy}`;
    const ex = d.to.x - nodeW/2, ey = d.to.y;
    if (ex > sx + 5) {
      const mx = sx + (ex-sx)*0.5;
      return `M${sx},${sy} C${mx},${sy} ${mx},${ey} ${ex},${ey}`;
    }
    const arc = T.nodeH*1.8;
    return `M${sx},${sy} C${sx+24},${sy+arc} ${ex-24},${ey+arc} ${ex},${ey}`;
  }

  _renderArrows(state, pos, step, cp) {
    const ids = getOrderedIds(state);
    const arrowData = [];

    ids.forEach(fromId => {
      const node = state.nodes[fromId];
      const toId = node.next;
      const ph   = (step.highlights?.pointers??[]).find(p=>p.fromId===fromId&&p.toId===toId);
      const role = ph?.role ?? 'default';
      const style = T.pointerRoles[role] ?? T.pointerRoles.default;
      if (toId && pos[toId]) {
        arrowData.push({ key:`${fromId}->${toId}`, fromId, toId, type:'link', role, style, from:pos[fromId], to:pos[toId] });
      } else {
        arrowData.push({ key:`${fromId}->null`, fromId, toId:null, type:'null', role:'default', style:T.pointerRoles.default, from:pos[fromId], to:null });
      }
    });

    const arrows = this._layerArrows.selectAll('g.arrow').data(arrowData, d => d.key);

    arrows.exit().transition().delay(cp.arrowExit.delay).duration(cp.arrowExit.duration)
      .style('opacity',0).remove();

    const entered = arrows.enter().append('g').attr('class','arrow').style('opacity',0);
    entered.append('path').attr('class','arrow-path');
    entered.transition().delay(cp.arrowEnter.delay).duration(cp.arrowEnter.duration).style('opacity',1);

    const merged = entered.merge(arrows);
    merged.transition().delay(cp.arrowReroute.delay).duration(cp.arrowReroute.duration)
      .select('.arrow-path')
        .attr('d', d => this._arrowPath(d))
        .attr('stroke', d => d.style.stroke)
        .attr('stroke-width', T.arrowStrokeW)
        .attr('stroke-dasharray', d => d.style.dasharray || null)
        .attr('fill', 'none')
        .attr('marker-end', d => d.type==='null' ? null : `url(#arrow-${d.role})`);

    // Null labels
    this._layerArrows.selectAll('text.null-label').remove();
    arrowData.filter(d => d.type==='null').forEach(d => {
      const nodeW = T.nodeValueW + T.nodeNextW;
      this._layerArrows.append('text').attr('class','null-label')
        .attr('x', d.from.x + nodeW/2 + T.nullStubLen + 6)
        .attr('y', d.from.y + 5)
        .attr('fill', T.pointerRoles.default.stroke)
        .attr('font-family', T.fontFamily).attr('font-size', 11)
        .text('null');
    });
  }

  _renderLabels(state, variables, pos, cp) {
    this._layerLabels.selectAll('*').remove();
    const nodeW = T.nodeValueW + T.nodeNextW;

    // Head badge
    if (state.head && pos[state.head]) {
      const hp = pos[state.head];
      const hy = hp.y - T.nodeH/2 - T.labelOffsetY;
      const g  = this._layerLabels.append('g').attr('class','head-badge');
      g.append('line')
        .attr('x1',hp.x).attr('y1',hy+18).attr('x2',hp.x).attr('y2',hp.y-T.nodeH/2-2)
        .attr('stroke','#6366f1').attr('stroke-width',1.5).attr('marker-end','url(#arrow-head-label)');
      g.append('rect')
        .attr('x',hp.x-22).attr('y',hy-11).attr('width',44).attr('height',20).attr('rx',4)
        .attr('fill','#1e1b4b').attr('stroke','#6366f1').attr('stroke-width',1.5);
      g.append('text')
        .attr('x',hp.x).attr('y',hy+1).attr('text-anchor','middle').attr('dominant-baseline','central')
        .attr('font-family',T.fontFamily).attr('font-size',10).attr('fill','#a5b4fc').attr('font-weight','600')
        .text('head');
    }

    // Variable labels (current, prev, newNode, next, etc.)
    if (variables) {
      Object.entries(variables).forEach(([name, nodeId], i) => {
        if (!nodeId || !pos[nodeId]) return;
        const p = pos[nodeId];
        const x = p.x, y = p.y + T.nodeH/2 + 22 + i * 20;
        const g = this._layerLabels.append('g').attr('class','var-label');
        g.append('line')
          .attr('x1',x).attr('y1',p.y+T.nodeH/2)
          .attr('x2',x).attr('y2',y-4)
          .attr('stroke','#334155').attr('stroke-width',1).attr('stroke-dasharray','3 2');
        g.append('rect')
          .attr('x',x-26).attr('y',y-9).attr('width',52).attr('height',17).attr('rx',4)
          .attr('fill','#1e293b').attr('stroke','#334155').attr('stroke-width',1);
        g.append('text')
          .attr('x',x).attr('y',y+1).attr('text-anchor','middle').attr('dominant-baseline','central')
          .attr('font-family',T.fontFamily).attr('font-size',9).attr('fill','#94a3b8')
          .text(name);
      });
    }
  }

  _panToActive(pos, roleMap) {
    const activeId = Object.keys(roleMap).find(id => pos[id]);
    if (!activeId) return;
    const p   = pos[activeId];
    const svgW = this._svgEl.clientWidth, svgH = this._svgEl.clientHeight;
    this._svg.transition().duration(T.t.nodeMove)
      .call(this._zoom.transform, d3.zoomIdentity.translate(svgW/2 - p.x, svgH/2 - p.y));
  }

  resetView(state) {
    const ids = getOrderedIds(state);
    const pos = computeLayout(state);
    if (!ids.length) return;
    const nodeW = T.nodeValueW + T.nodeNextW;
    const firstX = pos[ids[0]].x - nodeW/2 - 40;
    const lastX  = pos[ids[ids.length-1]].x + nodeW/2 + T.nullStubLen + 60;
    const totalW = lastX - firstX;
    const svgW   = this._svgEl.clientWidth, svgH = this._svgEl.clientHeight;
    const scale  = Math.min(1, svgW / totalW);
    const tx     = svgW/2 - (firstX + totalW/2) * scale;
    const ty     = svgH/2 - T.rowY * scale;
    this._svg.transition().duration(600)
      .call(this._zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
  }
}

// ════════════════════════════════════════════════════════════════════
//  NARRATIVE LAYER (sidebar)
// ════════════════════════════════════════════════════════════════════
function updateNarrative(step, currentOp) {
  // Explanation
  document.getElementById('explanation-text').textContent = step.explanation;

  // Pseudocode
  const lines = PSEUDOCODES[currentOp] ?? [];
  const codeEl = document.getElementById('code-lines');
  if (codeEl.children.length !== lines.length) {
    codeEl.innerHTML = lines.map((line, i) =>
      `<div class="code-line" data-line="${i}">
         <span class="line-num">${i}</span>
         <span class="line-code">${line}</span>
       </div>`
    ).join('');
  }
  codeEl.querySelectorAll('.code-line').forEach(el => {
    const active = Number(el.dataset.line) === step.pseudocodeLine;
    el.classList.toggle('active', active);
  });

  // Variables
  const varEl = document.getElementById('var-list');
  varEl.innerHTML = '';
  if (step.variables) {
    Object.entries(step.variables).forEach(([name, val]) => {
      const chip = document.createElement('div');
      chip.className = 'var-chip';
      const displayVal = val === null ? 'null' : String(val);
      chip.innerHTML = `<span class="var-name">${name}</span><span class="var-eq">=</span><span class="var-value">${displayVal}</span>`;
      varEl.appendChild(chip);
    });
  }
}

// ════════════════════════════════════════════════════════════════════
//  APP WIRING
// ════════════════════════════════════════════════════════════════════
let ctrl, anim, currentOp = 'traverse';

function parseList(str) {
  return str.split(',').map(s => s.trim()).filter(Boolean)
    .map(s => isNaN(s) ? s : Number(s));
}

function getOpParams() {
  const op  = document.getElementById('op-select').value;
  const val = document.getElementById('param-value').value;
  const idx = document.getElementById('param-index').value;
  return { op, value: isNaN(val) ? val : Number(val), index: Number(idx) };
}

const OPS_NEEDING_VALUE = new Set(['insertAtHead','insertAtTail','insertAtIndex','deleteByValue','searchByValue']);
const OPS_NEEDING_INDEX = new Set(['insertAtIndex','deleteAtIndex']);

function runOperation() {
  const listStr = document.getElementById('input-list').value;
  const values  = parseList(listStr);
  const list    = fromArray(values);
  const { op, value, index } = getOpParams();
  currentOp = op;

  const opMap = {
    traverse:      () => traverse(list),
    insertAtHead:  () => insertAtHead(list, value),
    insertAtTail:  () => insertAtTail(list, value),
    insertAtIndex: () => insertAtIndex(list, value, index),
    deleteAtHead:  () => deleteAtHead(list),
    deleteAtTail:  () => deleteAtTail(list),
    deleteByValue: () => deleteByValue(list, value),
    deleteAtIndex: () => deleteAtIndex(list, index),
    searchByValue: () => searchByValue(list, value),
    reverse:       () => reverse(list),
  };

  const steps = opMap[op]?.();
  if (!steps) return;

  if (ctrl) ctrl.destroy();
  ctrl = new PlaybackController(steps, { speed: currentSpeed(), pauseOnKeySteps: true });

  ctrl.on('frame',     step => anim.render(step));
  ctrl.on('narrative', step => updateNarrative(step, currentOp));
  ctrl.on('statusChange', updateStatus);
  ctrl.on('complete', () => updateStatus({ status:STATUS.DONE, currentIndex:ctrl.currentIndex, totalSteps:ctrl.totalSteps, progress:1 }));

  // Render first frame immediately
  anim.render(steps[0]);
  anim.resetView(steps[0].state);
  updateNarrative(steps[0], currentOp);

  // Build pseudocode panel for new op
  const lines = PSEUDOCODES[op] ?? [];
  const codeEl = document.getElementById('code-lines');
  codeEl.innerHTML = lines.map((line, i) =>
    `<div class="code-line" data-line="${i}">
       <span class="line-num">${i}</span>
       <span class="line-code">${line}</span>
     </div>`
  ).join('');
}

function updateStatus({ status, currentIndex, totalSteps, progress }) {
  const dot  = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  const fill = document.getElementById('progress-fill');
  const counter = document.getElementById('step-counter');
  const playBtn = document.getElementById('btn-play');

  dot.className = `${status}`;
  text.textContent = status;
  fill.style.width = `${(progress * 100).toFixed(1)}%`;
  counter.textContent = `${currentIndex + 1} / ${totalSteps}`;
  playBtn.textContent = status === STATUS.PLAYING ? '⏸' : '▶';

  // Key step banner
  const step = ctrl?.currentStep;
  const banner = document.getElementById('keystep-banner');
  if (step?.isKeyStep && status === 'paused') {
    banner.classList.add('show');
    setTimeout(() => banner.classList.remove('show'), 1800);
  }
}

function scrubTo(event) {
  const track = document.getElementById('progress-track');
  const rect  = track.getBoundingClientRect();
  const frac  = Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width));
  if (!ctrl) return;
  ctrl.jumpTo(Math.round(frac * (ctrl.totalSteps - 1)));
}

function currentSpeed() {
  return Number(document.getElementById('speed-range').value) * 0.4;
}

function onSpeedChange(val) {
  const speed = Number(val) * 0.4;
  document.getElementById('speed-label').textContent = `${speed.toFixed(1)}×`;
  if (ctrl) ctrl.setSpeed(speed);
}

// Show/hide params based on operation
document.getElementById('op-select').addEventListener('change', function() {
  const op = this.value;
  document.getElementById('param-value').style.display = OPS_NEEDING_VALUE.has(op) ? '' : 'none';
  document.getElementById('param-index').style.display = OPS_NEEDING_INDEX.has(op) ? '' : 'none';
});

// Init
window.addEventListener('load', () => {
  const svgEl = document.getElementById('viz-svg');
  anim = new AnimationLayer(svgEl);
  runOperation();
});
</script>
